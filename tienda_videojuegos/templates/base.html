{% load static %}
<!DOCTYPE html>
<html lang="es" data-bs-theme="light">
<head>
    <meta charset="UTF-8">
    <title>{% block title %}Tienda de Videojuegos{% endblock %}</title>

    <!-- CSS -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="{% static 'css/style.css' %}">
    <!--font awesome-->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">

    <!-- Scripts -->
    <script src="{% static 'js/script.js' %}"></script>
</head>
<body class="bg-body text-body">

    <!-- Cabecera con boton de cambio de tema -->
    <header class="d-flex justify-content-between align-items-center p-3 border-bottom">
        <button id="toggle-theme" class="btn btn-outline-secondary d-flex align-items-center rounded-circle shadow-sm"
        style="transition: all 0.3s ease;">
            <i class="fa-solid fa-circle-half-stroke"></i> 
        </button>
    </header>


    {% block content %}
    <!-- Aqui ira el contenido especifico de cada pagina -->
    {% endblock %}
    
    <footer class="text-center mt-5 mb-3">
        <p>2025 Tienda de Videojuegos</p>
        <a href="{% url 'home' %}" class="text-body">Inicio</a>
        <a href="{% url 'catalogo:lista_productos' %}" class="text-body ms-3">Catálogo</a>
        <a href="{% url 'contacto' %}" class="text-body ms-3">Contacto</a>
    </footer>

</body>
</html>
