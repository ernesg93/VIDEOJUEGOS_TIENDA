id: 20260320-002-bugfix-cart-session
title: "Bugfix: Sesiones de carrito se pierden al actualizar Django"
type: "bugfix"
scope: "project"
project: "VIDEOJUEGOS_TIENDA"
timestamp: "2026-03-20T14:15:00Z"
tags: [bugfix, django, sessions, cart, middleware]
content: |
  **What**: Solucionamos un bug donde las sesiones del carrito de compras se perdían aleatoriamente después de actualizar Django de 4.1 a 4.2
  **Why**: Los usuarios reportaban que sus carritos se vaciaban al navegar entre páginas, especialmente después de agregar varios productos
  **Where**: 
  - tienda_videojuegos/middleware/cart_session.py
  - tienda_videojuegos/settings.py (configuración de SESIONES)
  - tienda_videojuegos/views/carrito.py
  **Learned**: 
  - El cambio en Django 4.2 ajustó cómo se manejan las sesiones middleware en presencia de múltiples dominios (tienda.local vs www.tienda.local)
  - Nuestra configuración original tenía `SESSION_COOKIE_DOMAIN` vacío, lo que causaba que las cookies de sesión no se compartieran entre subdominios
  - La solución fue establecer explícitamente `SESSION_COOKIE_DOMAIN = ".tienda.local"` en settings.py para incluir todos los subdominios
  - Además, añadimos pruebas de integración que simulan cambios de subdominio para prevenir regresiones
  - El debugging fue complicado porque el bug solo ocurría en producción con el dominio real, no en desarrollo local